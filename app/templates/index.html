<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophical Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar / Claw Panel -->
    <aside class="w-1/4 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-700">
            <h2 class="text-xl font-bold text-red-400">The Claw (Logic Referee)</h2>
            <p class="text-xs text-gray-400">Real-time Fallacy Detection</p>
        </div>
        <div id="claw-panel" class="flex-1 p-4 overflow-y-auto space-y-4">
            <!-- Fallacies will appear here -->
            <div class="text-gray-500 text-sm italic text-center">No fallacies detected yet...</div>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-2xl font-bold text-blue-400">Socratic Arena</h1>
            <div class="flex items-center space-x-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-sm text-gray-300">Agent: Socrates</span>
            </div>
        </header>

        <!-- Chat History -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Messages go here -->
            <div class="flex justify-start">
                <div class="bg-blue-900/50 p-3 rounded-lg max-w-2xl border border-blue-800">
                    <p class="text-sm font-semibold text-blue-300 mb-1">Socrates</p>
                    <p>Welcome, seeker of wisdom. What topic shall we examine today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gray-800 border-t border-gray-700">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-input"
                    class="flex-1 bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 transition-colors"
                    placeholder="Type your argument..." autocomplete="off">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    Send
                </button>
            </form>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
